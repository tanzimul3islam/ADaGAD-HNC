name: baselines
model_type: contrastive_only

contrastive_only:
  encoder:
    type: gat
    hidden_dim: 256
    num_layers: 3
    dropout: 0.1
    heads: 8
    residual: true
  readout:
    type: mean
    hidden_dim: 256

reconstruction_only:
  encoder:
    type: Gat
    hidden_dim: 256
    num_layers: 3
    dropout: 0.1
    heads: 8
    residual: true
  decoder:
    hidden_dim: 256
    num_layers: 2

fixed_fusion:
  encoder:
    type: gat
    hidden_dim: 256
    num_layers: 3
    dropout: 0.1
    heads: 8
    residual: true
  readout:
    type: mean
    hidden_dim: 256
  fusion_weights:
    context: 0.5
    patch: 0.3
    recon: 0.2

cola_like:
  encoder:
    type: sage
    hidden_dim: 256
    num_layers: 2
    dropout: 0.5
  local_discriminator:
    hidden_dim: 128
  global_discriminator:
    hidden_dim: 256

slgad_like:
  encoder:
    type: gat
    hidden_dim: 256
    num_layers: 2
    dropout: 0.1
    heads: 4
  structure_learner:
    hidden_dim: 64
  score_norm: batch_norm
